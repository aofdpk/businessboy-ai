<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ปฏิทินคอนเทนต์ 30 วัน 🗓️</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#4568dc;--bg2:#b06ab3;--accent:#7c3aed;--soft:#f5f3ff;--card:#fff;--ink:#1f2937;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt',system-ui,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;color:var(--ink);padding:20px 14px 60px}
.wrap{max-width:460px;margin:0 auto}
header{text-align:center;color:#fff;margin-bottom:18px}
header h1{font-size:26px;font-weight:700}
header p{font-size:13px;opacity:.92;margin-top:4px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.18);margin-bottom:16px}
label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
input,textarea,select{width:100%;border:2px solid var(--soft);border-radius:13px;padding:12px 14px;font-size:15px;outline:none;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:2px solid var(--soft);background:#fff;color:var(--muted);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s}
.chip.on{border-color:var(--accent);background:var(--soft);color:var(--accent);font-weight:600}
.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--bg1),var(--accent));color:#fff;box-shadow:0 10px 24px rgba(0,0,0,.25);margin-bottom:0}
.btn:disabled{opacity:.6;cursor:not-allowed}
.actions{display:flex;gap:10px;margin-bottom:16px}
.btn-sub{flex:1;border:none;border-radius:14px;padding:13px 10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--soft);color:var(--accent)}
.btn-sub:hover{background:#ede9fe}
.loading{text-align:center;color:#fff;padding:22px;font-size:15px}
.spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin:0 auto 10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.day-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 8px 20px rgba(0,0,0,.1);display:flex;gap:12px;align-items:flex-start}
.day-num{min-width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--bg1),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-topic{font-size:15px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:4px}
.day-hook{font-size:13px;color:var(--ink);line-height:1.45;margin-bottom:4px}
.day-angle{font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:6px}
.day-cta{font-size:12px;color:var(--accent);line-height:1.4;margin-bottom:6px;font-weight:500}
.day-meta{display:flex;gap:6px;flex-wrap:wrap}
.day-type,.day-plat{display:inline-block;background:var(--soft);color:var(--accent);border-radius:8px;padding:2px 9px;font-size:12px;font-weight:600}
.day-plat{background:#eef2ff;color:var(--bg1)}
.error-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 8px 20px rgba(0,0,0,.1);color:#dc2626;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ปฏิทินคอนเทนต์ 30 วัน 🗓️</h1>
    <p>วางแผนคอนเทนต์ทั้งเดือน ให้ AI ช่วยคิดให้</p>
  </header>

  <div class="card">
    <div class="field">
      <label>ธุรกิจของคุณ</label>
      <input id="business" placeholder="เช่น ร้านเสื้อผ้าวินเทจ, ขายครีมบำรุงผิว, คาเฟ่สัตว์เลี้ยง">
    </div>
    <div class="field">
      <label>เป้าหมายหลัก</label>
      <select id="goal">
        <option value="ขายของ / เพิ่มยอดขาย">💰 ขายของ / เพิ่มยอดขาย</option>
        <option value="สร้างแบรนด์ / สร้างความน่าเชื่อถือ">✨ สร้างแบรนด์ / สร้างความน่าเชื่อถือ</option>
        <option value="เพิ่มผู้ติดตาม / เพิ่ม Engagement">📈 เพิ่มผู้ติดตาม / เพิ่ม Engagement</option>
      </select>
    </div>
    <div class="field">
      <label>แพลตฟอร์มหลัก</label>
      <div class="chips" id="platChips">
        <button type="button" class="chip on" data-plat="Facebook">Facebook</button>
        <button type="button" class="chip" data-plat="Instagram">Instagram</button>
        <button type="button" class="chip" data-plat="TikTok">TikTok</button>
        <button type="button" class="chip" data-plat="LINE OA">LINE OA</button>
        <button type="button" class="chip" data-plat="Shopee/Lazada">Shopee/Lazada</button>
      </div>
    </div>
    <div class="field">
      <label>โทนการสื่อสาร</label>
      <div class="chips" id="toneChips">
        <button type="button" class="chip on" data-tone="เป็นกันเอง สนุก">เป็นกันเอง สนุก</button>
        <button type="button" class="chip" data-tone="มืออาชีพ น่าเชื่อถือ">มืออาชีพ น่าเชื่อถือ</button>
        <button type="button" class="chip" data-tone="หรูหรา พรีเมียม">หรูหรา พรีเมียม</button>
        <button type="button" class="chip" data-tone="เร่งด่วน กระตุ้นยอด">เร่งด่วน กระตุ้นยอด</button>
      </div>
    </div>
  </div>

  <button class="btn" id="go" onclick="run()">🗓️ สร้างแผน 30 วัน</button>
  <div id="output" style="margin-top:16px"></div>
</div>

<script src="gemini-kit.js"></script>
<script>
GeminiKit.mountGear();

let planData = [];

// chip pickers (single-select)
function initChips(id){
  const box = document.getElementById(id);
  box.addEventListener('click', e => {
    const c = e.target.closest('.chip');
    if (!c) return;
    box.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
  });
}
initChips('platChips');
initChips('toneChips');
function pickedChip(id, attr){
  const on = document.querySelector('#'+id+' .chip.on');
  return on ? on.getAttribute(attr) : '';
}

async function run() {
  const business = document.getElementById('business').value.trim();
  const goal = document.getElementById('goal').value;
  const platform = pickedChip('platChips','data-plat');
  const tone = pickedChip('toneChips','data-tone');
  if (!business) { GeminiKit.toast('ใส่ประเภทธุรกิจก่อนนะ'); return; }

  const out = document.getElementById('output');
  const btn = document.getElementById('go');
  btn.disabled = true;
  planData = [];
  out.innerHTML = '<div class="loading"><div class="spinner"></div>AI กำลังวางแผนคอนเทนต์ 30 วัน...</div>';

  const system = 'คุณคือนักวางแผนคอนเทนต์และนักการตลาดขายของออนไลน์ไทยมือโปร เชี่ยวชาญการปั้นเพจให้ปังและปิดการขายผ่านโซเชียล เข้าใจพฤติกรรมลูกค้าไทยลึกซึ้ง เขียนภาษาขายของที่อ่านแล้วอยากซื้อทันที ใช้ภาษาไทยธรรมชาติ ห้ามแต่งข้อมูลสินค้า ราคา หรือโปรโมชั่นที่ผู้ใช้ไม่ได้ให้ ถ้าต้องการตัวอย่างให้เขียนเป็นช่องว่างให้เติม เช่น [ใส่ราคา] [ใส่ชื่อสินค้า]';

  const prompt = `สร้างแผนคอนเทนต์ 30 วัน ที่นำไปลงได้จริง สำหรับธุรกิจนี้
ธุรกิจ: ${business}
เป้าหมายหลัก: ${goal}
แพลตฟอร์มหลัก: ${platform}
โทนการสื่อสาร: ${tone}

กฎการวางแผน:
- แต่ละวันต้องเป็นหัวข้อที่ไม่ซ้ำกัน และไล่เป็นจังหวะแบบนักการตลาด: สลับคอนเทนต์ให้คุณค่า/สร้างความน่าเชื่อถือ/สร้างการมีส่วนร่วม/และคอนเทนต์ปิดการขาย (อย่าขายทุกวัน)
- ออกแบบให้เหมาะกับธรรมชาติของ ${platform} โดยเฉพาะ
- โทนทุกชิ้นต้องเป็นแบบ "${tone}"
- "hook" = ประโยคเปิด/แคปชั่นเปิดที่หยุดนิ้วคนเลื่อน เขียนให้พร้อมก๊อปไปใช้ (1-2 ประโยค ภาษาขายของไทย)
- "cta" = สิ่งที่อยากให้ลูกค้าทำต่อ ให้เหมาะกับเป้าหมาย เช่น ทักแชท/คอมเมนต์/กดสั่ง/แชร์
- ห้ามแต่งราคา โปรโมชั่น หรือรายละเอียดสินค้าที่ไม่ได้ให้มา ถ้าจำเป็นให้ใส่เป็นช่องเติม เช่น [ใส่ราคา]

ตอบเป็น JSON array เท่านั้น ห้ามมีข้อความอื่นนอก array รูปแบบแต่ละรายการ:
{"day":1,"topic":"หัวข้อคอนเทนต์","hook":"ประโยคเปิดที่ก๊อปไปใช้ได้เลย","angle":"มุมเล่า/เหตุผลที่คนสนใจ","cta":"คำกระตุ้นให้ทำต่อ","type":"รูปแบบ เช่น รีล/โพสต์รูป/ไลฟ์/สตอรี่/วิดีโอสั้น"}
ต้องมีครบ 30 รายการ day 1 ถึง 30`;

  try {
    const arr = await GeminiKit.text(prompt, { json: true, system });
    if (!Array.isArray(arr) || arr.length === 0) throw new Error('AI ตอบในรูปแบบที่อ่านไม่ได้ ลองใหม่อีกครั้ง');

    planData = arr.slice(0, 30);

    let html = '<div class="actions">'
      + '<button class="btn-sub" onclick="copyAll()">📋 คัดลอกทั้งหมด</button>'
      + '<button class="btn-sub" onclick="downloadAll()">⬇️ ดาวน์โหลด .txt</button>'
      + '</div>';
    html += planData.map(item => {
      const day = parseInt(item.day) || 0;
      const topic = esc(item.topic || '');
      const hook = esc(item.hook || '');
      const angle = esc(item.angle || '');
      const cta = esc(item.cta || '');
      const type = esc(item.type || '');
      const platform2 = esc(platform);
      return `<div class="day-card">
        <div class="day-num">${day}</div>
        <div class="day-info">
          <div class="day-topic">${topic}</div>
          ${hook ? `<div class="day-hook">✍️ ${hook}</div>` : ''}
          ${angle ? `<div class="day-angle">📌 ${angle}</div>` : ''}
          ${cta ? `<div class="day-cta">👉 ${cta}</div>` : ''}
          <div class="day-meta">
            ${type ? `<span class="day-type">${type}</span>` : ''}
            ${platform2 ? `<span class="day-plat">${platform2}</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');

    out.innerHTML = html;
  } catch (e) {
    out.innerHTML = '<div class="error-card">⚠️ ' + esc(e.message) + '</div>';
  } finally {
    btn.disabled = false;
  }
}

function buildPlanText() {
  return planData.map(item => {
    let s = `วันที่ ${item.day}: ${item.topic || ''}`;
    if (item.hook)  s += `\nเปิดด้วย: ${item.hook}`;
    if (item.angle) s += `\nมุม: ${item.angle}`;
    if (item.cta)   s += `\nCTA: ${item.cta}`;
    if (item.type)  s += `\nรูปแบบ: ${item.type}`;
    return s;
  }).join('\n\n');
}

function copyAll() {
  if (!planData.length) return;
  GeminiKit.copy(buildPlanText());
}

function downloadAll() {
  if (!planData.length) return;
  GeminiKit.download('แผนคอนเทนต์-30วัน.txt', buildPlanText(), 'text/plain');
}

function esc(s) {
  return (s == null ? '' : s).toString().replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}
</script>
</body></html>
