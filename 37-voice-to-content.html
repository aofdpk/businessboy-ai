<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>วอยซ์โน้ต → คอนเทนต์</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#834d9b;--bg2:#d04ed6;--accent:#a21caf;--soft:#fae8ff;--card:#fff;--ink:#1f2937;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt',system-ui,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;color:var(--ink);padding:20px 14px 60px}
.wrap{max-width:460px;margin:0 auto}
header{text-align:center;color:#fff;margin-bottom:18px}
header h1{font-size:26px;font-weight:700}
header p{font-size:13px;opacity:.92;margin-top:4px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.18);margin-bottom:16px}
label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
.field{margin-bottom:14px}
.drop{border:2px dashed var(--soft);border-radius:16px;padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--soft)}
.drop:hover,.drop.over{border-color:var(--accent);background:#f5d0fe}
.drop .icon{font-size:36px;margin-bottom:8px}
.drop .hint{font-size:14px;color:var(--muted)}
.drop .hint span{color:var(--accent);font-weight:600}
.audio-preview{margin-top:14px;display:none}
.audio-preview audio{width:100%;border-radius:10px}
.audio-info{display:flex;align-items:center;gap:10px;background:var(--soft);border-radius:10px;padding:10px 12px;margin-top:8px}
.audio-info .fname{font-size:13px;color:var(--ink);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audio-info .remove{border:none;background:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#3a1d00;box-shadow:0 12px 28px rgba(245,158,11,.5);margin-bottom:6px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-rec{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.btn-rec.recording{background:linear-gradient(135deg,#ef4444,#dc2626);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{box-shadow:0 10px 24px rgba(0,0,0,.25)}50%{box-shadow:0 10px 36px rgba(220,38,38,.55)}}
.rec-info{text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px;min-height:20px}
.rec-info.active{color:#dc2626;font-weight:600}
.hint-warn{font-size:12px;color:var(--muted);text-align:center;margin-top:6px}
.loading{text-align:center;color:#fff;padding:22px;font-size:15px}
.spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin:0 auto 10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-text{margin-top:6px;font-size:14px;opacity:.9}
.section-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.result-block{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 8px 20px rgba(0,0,0,.1);position:relative}
.result-block .result-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.result-text{white-space:pre-wrap;font-size:15px;line-height:1.75}
.block-actions{display:flex;gap:6px;justify-content:flex-end;margin-bottom:8px}
.copy{border:none;background:var(--soft);color:var(--accent);border-radius:9px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.captions-list li .copy{position:absolute;top:8px;right:8px}
.copy-inline{margin-left:auto}
.section-title .copy-inline:first-of-type{margin-left:auto}
.section-title .copy-inline+.copy-inline{margin-left:6px}
.captions-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.captions-list li{background:var(--soft);border-radius:12px;padding:12px 44px 12px 14px;font-size:14px;line-height:1.6;position:relative}
.captions-list li .copy{top:8px;right:8px}
.error-card{background:#fff;border-radius:16px;padding:14px 16px;color:#dc2626;font-size:15px;box-shadow:0 8px 20px rgba(0,0,0,.1);margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>วอยซ์โน้ต → คอนเทนต์ 🗣️</h1>
    <p>อัดเสียงหรืออัปไฟล์ → AI แปลงเป็นโพสต์ บทความ และแคปชั่น</p>
  </header>

  <div class="card">
    <div class="field">
      <label>🎙️ อัดเสียงใหม่</label>
      <div class="rec-info" id="recInfo">กดปุ่มเพื่อเริ่มอัด</div>
      <button class="btn btn-rec" id="recBtn" onclick="toggleRecord()">🔴 เริ่มอัดเสียง</button>
    </div>
    <div style="text-align:center;color:var(--muted);font-size:13px;margin:6px 0 14px">— หรือ —</div>
    <div class="field">
      <label>📂 อัปไฟล์เสียง</label>
      <div class="drop" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="icon">🎵</div>
        <div class="hint">แตะเพื่อเลือกไฟล์ หรือลากมาวาง<br><span>รองรับ mp3, m4a, wav, ogg, webm</span></div>
      </div>
      <input type="file" id="fileInput" accept="audio/*,video/*" hidden onchange="onFileChange(event)">
      <div class="audio-preview" id="audioPreview">
        <audio id="audioPlayer" controls></audio>
        <div class="audio-info">
          <span class="fname" id="audioName"></span>
          <button class="remove" onclick="clearFile()" title="ลบ">✕</button>
        </div>
      </div>
    </div>
    <p class="hint-warn">💡 คลิปยิ่งสั้นยิ่งเร็ว แนะนำไม่เกิน 5 นาที</p>
  </div>

  <button class="btn" id="goBtn" onclick="run()">✨ แปลงเป็นคอนเทนต์เลย</button>

  <div id="output" style="margin-top:16px"></div>
</div>

<script src="gemini-kit.js"></script>
<script>
GeminiKit.mountGear();

let selectedFile = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let recTimer = null;
let recSeconds = 0;

/* ===== Recording ===== */
async function toggleRecord() {
  if (!isRecording) {
    await startRecord();
  } else {
    stopRecord();
  }
}

async function startRecord() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const file = new File([blob], 'recording.webm', { type: 'audio/webm' });
      setFile(file);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    isRecording = true;
    recSeconds = 0;
    updateRecUI();
    recTimer = setInterval(() => { recSeconds++; updateRecUI(); }, 1000);
  } catch (e) {
    GeminiKit.toast('ไม่สามารถเข้าถึงไมค์ได้: ' + e.message);
  }
}

function stopRecord() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  clearInterval(recTimer);
  const btn = document.getElementById('recBtn');
  const info = document.getElementById('recInfo');
  btn.classList.remove('recording');
  btn.textContent = '🔴 เริ่มอัดเสียง';
  info.classList.remove('active');
  info.textContent = 'บันทึกแล้ว ✓';
}

function updateRecUI() {
  const btn = document.getElementById('recBtn');
  const info = document.getElementById('recInfo');
  const mm = String(Math.floor(recSeconds / 60)).padStart(2, '0');
  const ss = String(recSeconds % 60).padStart(2, '0');
  btn.classList.add('recording');
  btn.textContent = '⏹ หยุดอัด';
  info.classList.add('active');
  info.textContent = '⏺ กำลังอัด... ' + mm + ':' + ss;
}

/* ===== File handling ===== */
function onFileChange(e) {
  const file = e.target.files[0];
  if (file) setFile(file);
}

function setFile(file) {
  selectedFile = file;
  const MB = file.size / (1024 * 1024);
  if (MB > 80) {
    GeminiKit.toast('⚠️ ไฟล์ใหญ่ ' + MB.toFixed(0) + 'MB อาจอัปโหลดช้าหรือไม่สำเร็จ แนะนำคลิปสั้นลง');
  }
  const preview = document.getElementById('audioPreview');
  const player = document.getElementById('audioPlayer');
  const nameEl = document.getElementById('audioName');
  const url = URL.createObjectURL(file);
  player.src = url;
  nameEl.textContent = file.name;
  preview.style.display = 'block';
}

function clearFile() {
  selectedFile = null;
  document.getElementById('audioPreview').style.display = 'none';
  document.getElementById('audioPlayer').src = '';
  document.getElementById('audioName').textContent = '';
  document.getElementById('fileInput').value = '';
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('over');
}

function onDragLeave(e) {
  document.getElementById('dropZone').classList.remove('over');
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
}

/* ===== Main ===== */
async function run() {
  if (!selectedFile) {
    GeminiKit.toast('อัดเสียงหรืออัปไฟล์เสียงก่อนนะ');
    return;
  }

  const out = document.getElementById('output');
  const btn = document.getElementById('goBtn');
  btn.disabled = true;

  out.innerHTML = '<div class="loading"><div class="spinner"></div><div class="progress-text" id="progressText">กำลังอัปโหลดไฟล์เสียง...</div></div>';

  const prompt = `คุณคือนักวางกลยุทธ์คอนเทนต์และคอปปี้ไรเตอร์มือโปรของแบรนด์ไทย ที่เชี่ยวชาญการแปลงเสียงพูดดิบ ๆ ของเจ้าของธุรกิจให้กลายเป็นคอนเทนต์ขายของได้จริง

ฟังเสียงต่อไปนี้อย่างละเอียด จับใจความ ประเด็นสำคัญ และน้ำเสียงของผู้พูด แล้วสร้างผลลัพธ์ภาษาไทยที่ "พร้อมใช้งานทันที" (actionable)

แนวทาง:
- ถ้าเป็นการ "สั่งงาน/โน้ตงาน/ออเดอร์ลูกค้า" ให้สรุปเป็น To-do หรือรายการที่ชัดเจน เรียงลำดับความสำคัญ ระบุสิ่งที่ต้องทำต่อ
- ถ้าเป็น "ไอเดีย/เล่าเรื่อง/รีวิวสินค้า" ให้ปั้นเป็นคอนเทนต์ที่ดึงดูดและกระตุ้นการตัดสินใจ มี hook เปิด และ CTA ปิด
- รักษาข้อเท็จจริงจากเสียงให้แม่นยำ ห้ามแต่งตัวเลข ชื่อ หรือรายละเอียดที่ไม่ได้พูด ถ้าฟังไม่ชัดให้ใส่ [ฟังไม่ชัด] แทนการเดา

ตอบเป็น JSON เท่านั้น ห้ามมีข้อความอื่นนอก JSON schema:
{
 "summary": "สรุปใจความสำคัญของเสียงเป็น bullet สั้น ๆ 3-5 ข้อ (ขึ้นบรรทัดใหม่ด้วย \\n นำหน้าด้วย •) เพื่อให้เจ้าของธุรกิจเห็นภาพรวมทันที",
 "post": "โพสต์โซเชียลมีเดียพร้อมลง มี hook เปิดที่หยุดนิ้วคนเลื่อน เนื้อหากระชับ มี emoji เหมาะสม ปิดด้วย CTA ชัดเจน และแฮชแท็กที่เกี่ยวข้อง 3-5 ตัว",
 "article": "บทความเรียบเรียงเป็นทางการขึ้น เหมาะลงบล็อก/เว็บไซต์ มีหัวข้อย่อยคั่นเป็นช่วง อ่านง่าย ให้คุณค่าจริง",
 "captions": ["แคปชั่นสั้นกระชับพร้อม CTA แบบที่ 1","แคปชั่นสั้นโทนต่างกันแบบที่ 2","แคปชั่นสั้นโทนต่างกันแบบที่ 3"]
}`;

  try {
    const result = await GeminiKit.media(prompt, selectedFile, (stage, text) => {
      const el = document.getElementById('progressText');
      if (el) el.textContent = text || stage;
    });

    let data;
    try {
      const match = result.match(/\{[\s\S]*\}/);
      data = match ? JSON.parse(match[0]) : null;
    } catch (e) {
      data = null;
    }

    if (!data || !data.post || !data.article || !Array.isArray(data.captions)) {
      throw new Error('AI ตอบในรูปแบบที่อ่านไม่ได้ ลองใหม่อีกครั้ง');
    }

    let html = '';

    if (data.summary) {
      html += block('🧾 สรุปใจความสำคัญ', 'สรุป', data.summary, 'voice-summary.txt');
    }

    html += block('📣 โพสต์โซเชียลมีเดีย', 'โพสต์', data.post, 'voice-post.txt');
    html += block('📝 บทความเรียบเรียง', 'บทความ', data.article, 'voice-article.txt');

    const capsJoined = data.captions.map(function(c, i) { return (i + 1) + '. ' + c; }).join('\n');
    html += '<div class="card">';
    html += '<div class="section-title">✂️ แคปชั่นสั้น (3 แบบ)';
    html += '<button class="copy copy-inline" data-raw="' + esc(capsJoined) + '" onclick="cp(this)">คัดลอกทั้งหมด</button>';
    html += '<button class="copy copy-inline" data-raw="' + esc(capsJoined) + '" data-fn="voice-captions.txt" onclick="dl(this)">⬇ .txt</button>';
    html += '</div>';
    html += '<ul class="captions-list">';
    data.captions.forEach(function(c) {
      html += '<li>' + esc(c) + '<button class="copy" data-raw="' + esc(c) + '" onclick="cp(this)">คัดลอก</button></li>';
    });
    html += '</ul></div>';

    out.innerHTML = html;
  } catch (e) {
    out.innerHTML = '<div class="error-card">⚠️ ' + esc(e.message) + '</div>';
  } finally {
    btn.disabled = false;
  }
}

function block(title, label, text, filename) {
  let h = '<div class="card">';
  h += '<div class="section-title">' + esc(title) + '</div>';
  h += '<div class="result-block">';
  h += '<div class="block-actions">';
  h += '<button class="copy" data-raw="' + esc(text) + '" onclick="cp(this)">คัดลอก</button>';
  h += '<button class="copy" data-raw="' + esc(text) + '" data-fn="' + esc(filename) + '" onclick="dl(this)">⬇ .txt</button>';
  h += '</div>';
  h += '<div class="result-text">' + esc(text) + '</div>';
  h += '</div></div>';
  return h;
}

function cp(btn) {
  const t = btn.getAttribute('data-raw') || '';
  GeminiKit.copy(t);
  const orig = btn.textContent;
  btn.textContent = '✓';
  setTimeout(function() { btn.textContent = orig; }, 1200);
}

function dl(btn) {
  const t = btn.getAttribute('data-raw') || '';
  const fn = btn.getAttribute('data-fn') || 'content.txt';
  GeminiKit.download(fn, t, 'text/plain');
}

function esc(s) {
  return (s == null ? '' : s).toString().replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
</script>
</body></html>
