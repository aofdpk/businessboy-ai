<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สตูดิโอถ่ายสินค้า AI 📸</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg1:#141e30;--bg2:#243b55;--card:#fff;--ink:#1f2937;--muted:#6b7280;--soft:#eef2f7;--accent:#0ea5e9}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Prompt',system-ui,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;color:var(--ink);padding:20px 14px 60px}
  .wrap{max-width:460px;margin:0 auto}
  header{text-align:center;color:#fff;margin-bottom:18px}
  header h1{font-size:26px;font-weight:700;text-shadow:0 3px 12px rgba(0,0,0,.25)}
  header p{font-size:13px;opacity:.85;margin-top:4px}
  .card{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.2);margin-bottom:16px}
  .drop{border:2.5px dashed #cbd5e1;border-radius:16px;padding:26px;text-align:center;cursor:pointer;color:var(--muted)}
  .drop:hover{border-color:var(--accent);background:var(--soft)}
  .drop .ic{font-size:38px}
  .preview{width:100%;border-radius:14px;display:none}
  label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin:14px 0 8px}
  .styles{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .st{border:2px solid var(--soft);border-radius:12px;padding:11px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);font-family:inherit}
  .st.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .st small{display:block;font-size:10px;color:var(--muted);font-weight:400;margin-top:2px}
  .st.on small{color:rgba(255,255,255,.85)}
  .ratios{display:flex;gap:8px}
  .rt{flex:1;border:2px solid var(--soft);border-radius:12px;padding:9px 4px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);font-family:inherit}
  .rt.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .rt small{display:block;font-size:9px;color:var(--muted);font-weight:400;margin-top:2px}
  .rt.on small{color:rgba(255,255,255,.85)}
  .chgbtn{display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);cursor:pointer;font-weight:600}
  .regen{display:inline-block;margin-top:12px;margin-left:8px;background:#fff;color:var(--accent);border:2px solid var(--accent);text-decoration:none;border-radius:12px;padding:9px 18px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
  textarea{width:100%;border:2px solid var(--soft);border-radius:12px;padding:11px 13px;font-size:14px;outline:none;font-family:inherit;resize:vertical}
  .btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#0ea5e9,#22d3ee);color:#fff;box-shadow:0 10px 24px rgba(14,165,233,.4);margin-top:14px}
  .btn:disabled{opacity:.6}
  .resultcard{background:var(--card);border-radius:18px;padding:14px;box-shadow:0 12px 30px rgba(0,0,0,.2);text-align:center}
  .resultcard img{width:100%;border-radius:12px}
  .dlbtn{display:inline-block;margin-top:12px;background:var(--accent);color:#fff;text-decoration:none;border-radius:12px;padding:11px 22px;font-weight:600;font-size:15px}
  .loading{text-align:center;color:#fff;padding:24px;font-size:15px}
  .spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin:0 auto 10px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .note{font-size:11px;color:rgba(255,255,255,.7);text-align:center;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>สตูดิโอถ่ายสินค้า AI 📸</h1>
    <p>อัปรูปสินค้าบ้านๆ → ได้ภาพระดับสตูดิโอ</p>
  </header>

  <div class="card">
    <div class="drop" id="drop" onclick="document.getElementById('file').click()">
      <div class="ic">📦</div><div>แตะอัปรูปสินค้า (พื้นหลังอะไรก็ได้)</div>
    </div>
    <img class="preview" id="preview" onclick="document.getElementById('file').click()" title="คลิกเพื่อเปลี่ยนรูป">
    <div id="chg" class="chgbtn" style="display:none" onclick="document.getElementById('file').click()">🔁 เปลี่ยนรูปสินค้า</div>
    <input type="file" id="file" accept="image/*" hidden onchange="onFile(event)">

    <label>เลือกสไตล์ฉาก</label>
    <div class="styles" id="styles"></div>

    <label>อัตราส่วนภาพ (สำหรับลงขาย)</label>
    <div class="ratios" id="ratios"></div>

    <label>ปรับแต่งเพิ่ม (ไม่ใส่ก็ได้)</label>
    <textarea id="extra" rows="2" placeholder="เช่น วางบนโต๊ะไม้ มีแสงแดดอุ่นๆ มีใบไม้ประกอบ"></textarea>
  </div>

  <button class="btn" id="go" onclick="run()" disabled>✨ สร้างภาพสตูดิโอ</button>
  <div class="note">รูปที่สร้างมี watermark ลายน้ำ SynthID ของ Google ฝังอยู่ (มองไม่เห็น)</div>

  <div id="output" style="margin-top:16px"></div>
</div>

<script src="gemini-kit.js"></script>
<script>
GeminiKit.mountGear();
const STYLES=[
  {k:'มินิมอลพื้นขาว',d:'พื้นหลังขาวสะอาด แสงนุ่ม',p:'clean minimal white studio background, soft professional product lighting, subtle shadow'},
  {k:'หรูหราพรีเมียม',d:'โทนดำ-ทอง ดูแพง',p:'luxury premium look, dark elegant background with gold accents, dramatic lighting, high-end product photography'},
  {k:'ธรรมชาติอบอุ่น',d:'ไม้ ใบไม้ แสงแดด',p:'warm natural setting, wooden surface, green leaves, soft sunlight, lifestyle product photography'},
  {k:'สีสันสดใส',d:'พื้นสีจัด ป๊อป',p:'vibrant colorful background, playful pop style, bright even lighting, eye-catching e-commerce photo'},
  {k:'มาร์เบิล/หินอ่อน',d:'หรูสะอาดตา',p:'white marble surface, elegant clean composition, soft diffused lighting'},
  {k:'คาเฟ่/อาหาร',d:'โต๊ะคาเฟ่อบอุ่น',p:'cozy cafe table setting, warm ambient light, appetizing food photography style'}
];
const RATIOS=[
  {k:'1:1',d:'Shopee/Lazada',p:'square 1:1 aspect ratio composition, product centered with even margins'},
  {k:'4:5',d:'IG ฟีด',p:'vertical 4:5 portrait aspect ratio composition, product framed for an Instagram feed post'},
  {k:'9:16',d:'Story/Reels',p:'tall vertical 9:16 aspect ratio composition, product framed for a full-screen story/reels, leave clean space top and bottom'}
];
let style=STYLES[0],ratio=RATIOS[0],file=null;
document.getElementById('styles').innerHTML=STYLES.map((s,i)=>`<div class="st ${i===0?'on':''}" onclick="pick(this,${i})">${s.k}<small>${s.d}</small></div>`).join('');
document.getElementById('ratios').innerHTML=RATIOS.map((r,i)=>`<div class="rt ${i===0?'on':''}" onclick="pickRatio(this,${i})">${r.k}<small>${r.d}</small></div>`).join('');
function pick(el,i){style=STYLES[i];document.querySelectorAll('.st').forEach(c=>c.classList.remove('on'));el.classList.add('on')}
function pickRatio(el,i){ratio=RATIOS[i];document.querySelectorAll('.rt').forEach(c=>c.classList.remove('on'));el.classList.add('on')}
function onFile(e){file=e.target.files[0];if(!file)return;const img=document.getElementById('preview');img.src=URL.createObjectURL(file);img.style.display='block';document.getElementById('drop').style.display='none';document.getElementById('chg').style.display='inline-block';document.getElementById('go').disabled=false}

async function run(){
  if(!file){GeminiKit.toast('อัปรูปสินค้าก่อน');return}
  const out=document.getElementById('output');const btn=document.getElementById('go');btn.disabled=true;
  out.innerHTML='<div class="loading"><div class="spinner"></div>AI กำลังจัดฉากถ่ายสินค้า...</div>';
  const extra=document.getElementById('extra').value.trim();
  const prompt=`Reimagine this exact product as a professional e-commerce product photo. Keep the product itself identical (same shape, color, label, branding) but place it in: ${style.p}. ${extra?('Additional: '+extra+'. '):''}${ratio.p}. Photorealistic, sharp focus, e-commerce ready. Do NOT distort, recolor, or alter the product. Keep all labels and branding readable and unchanged. No extra text, no watermark, no logos added.`;
  try{
    const dataUrl=await GeminiKit.generateImage(prompt,[file]);
    if(typeof dataUrl!=='string'||!dataUrl.startsWith('data:image')){
      throw new Error('AI สร้างรูปไม่สำเร็จ (อาจติดนโยบายเนื้อหาหรือคีย์มีปัญหา) ลองกด "สร้างใหม่อีกครั้ง" หรือเปลี่ยนรูป/สไตล์ดูครับ');
    }
    const fn='product-studio-'+ratio.k.replace(':','x')+'.png';
    out.innerHTML=`<div class="resultcard"><img src="${dataUrl}">`+
      `<div><a class="dlbtn" href="${dataUrl}" download="${fn}">⬇️ ดาวน์โหลดรูป</a>`+
      `<button class="regen" onclick="run()">🔄 สร้างใหม่อีกครั้ง</button></div></div>`;
  }catch(e){
    out.innerHTML=`<div class="resultcard" style="color:#dc2626">⚠️ ${esc(e.message)}<br><button class="regen" onclick="run()" style="margin-left:0">🔄 ลองอีกครั้ง</button></div>`;
  }finally{btn.disabled=false}
}
function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
</script>
</body>
</html>
