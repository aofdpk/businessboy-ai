<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เขียน Facebook Ads 📣</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>:root{--bg1:#1488cc;--bg2:#2b32b2;--accent:#2563eb;--soft:#eff6ff;--card:#fff;--ink:#1f2937;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Prompt',system-ui,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;color:var(--ink);padding:20px 14px 60px}
.wrap{max-width:460px;margin:0 auto}header{text-align:center;color:#fff;margin-bottom:18px}header h1{font-size:26px;font-weight:700}header p{font-size:13px;opacity:.92;margin-top:4px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.18);margin-bottom:16px}
label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}.field{margin-bottom:14px}
input,textarea,select{width:100%;border:2px solid var(--soft);border-radius:13px;padding:12px 14px;font-size:15px;outline:none;font-family:inherit;background:#fff}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#fbbf24,#f97316);color:#1f2937;box-shadow:0 12px 28px rgba(249,115,22,.5)}.btn:disabled{opacity:.55;filter:grayscale(.3)}
.loading{text-align:center;color:#fff;padding:22px;font-size:15px}.spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin:0 auto 10px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.ad-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,.1);position:relative}
.ad-card .badge{display:inline-block;background:var(--soft);color:var(--accent);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;margin-bottom:12px}
.ad-hook{font-size:16px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:8px}
.ad-body{font-size:14px;color:#374151;line-height:1.7;margin-bottom:10px;white-space:pre-wrap}
.ad-cta{display:inline-block;background:var(--accent);color:#fff;border-radius:10px;padding:7px 16px;font-size:13px;font-weight:600;margin-bottom:10px}
.copy-btn{width:100%;border:2px solid var(--soft);background:#fff;color:var(--accent);border-radius:10px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
.copy-btn:hover{background:var(--soft)}
.error-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 8px 20px rgba(0,0,0,.1);color:#dc2626;font-size:15px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:2px solid var(--soft);background:#fff;color:var(--muted);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.bulk{display:flex;gap:10px;margin-bottom:14px}
.bulk button{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#fbbf24,#f97316);color:#1f2937;box-shadow:0 8px 20px rgba(249,115,22,.4)}
</style></head>
<body><div class="wrap">
<header><h1>เขียน Facebook Ads 📣</h1><p>ใส่ข้อมูล → ได้ 5 ชุดโฆษณา A/B test</p></header>

<div class="card">
  <div class="field"><label>สินค้า / บริการ คืออะไร?</label><input id="product" placeholder="เช่น ครีมบำรุงผิว, คอร์สสอนทำขนม"></div>
  <div class="field"><label>กลุ่มเป้าหมาย</label><input id="target" placeholder="เช่น แม่บ้านอายุ 30-45 ปี ชอบดูแลตัวเอง"></div>
  <div class="field"><label>จุดขาย / โปรโมชัน</label><textarea id="promo" rows="3" placeholder="เช่น ลด 30% วันนี้วันเดียว, ส่งฟรี, ผลลัพธ์ใน 7 วัน"></textarea></div>
  <div class="field"><label>แพลตฟอร์มที่จะลงโฆษณา</label>
    <div class="chips" id="platChips">
      <div class="chip on" data-v="Facebook">Facebook</div>
      <div class="chip" data-v="Instagram">Instagram</div>
      <div class="chip" data-v="TikTok">TikTok</div>
      <div class="chip" data-v="LINE">LINE</div>
      <div class="chip" data-v="Shopee/Lazada">Shopee/Lazada</div>
    </div>
  </div>
  <div class="field"><label>โทนการเขียน</label>
    <select id="tone">
      <option value="ขายของแบบเป็นกันเอง ชวนคุย">เป็นกันเอง ชวนคุย</option>
      <option value="เร่งด่วน กระตุ้นให้รีบตัดสินใจ">เร่งด่วน กระตุ้นให้รีบซื้อ</option>
      <option value="พรีเมียม ดูหรู น่าเชื่อถือ">พรีเมียม ดูหรู</option>
      <option value="สนุก ตลก มีลูกเล่น">สนุก ตลก มีลูกเล่น</option>
      <option value="ให้ความรู้ จริงใจ เน้นประโยชน์">ให้ความรู้ จริงใจ</option>
    </select>
  </div>
</div>

<button class="btn" id="go" onclick="run()">📣 สร้างโฆษณา 5 ชุด</button>
<div id="output" style="margin-top:16px"></div>
</div>

<script src="gemini-kit.js"></script>
<script>
GeminiKit.mountGear();

// แพลตฟอร์ม: เลือกได้หลายอัน (multi-select chips)
document.getElementById('platChips').addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if(c) c.classList.toggle('on');
});
function selectedPlatforms(){
  return [...document.querySelectorAll('#platChips .chip.on')].map(c => c.dataset.v);
}

let lastAds = [];   // เก็บผลล่าสุดไว้ทำ "คัดลอกทั้งหมด" / ดาวน์โหลด

async function run(){
  const product = document.getElementById('product').value.trim();
  const target  = document.getElementById('target').value.trim();
  const promo   = document.getElementById('promo').value.trim();
  const tone    = document.getElementById('tone').value;
  const plats   = selectedPlatforms();

  if(!product){ GeminiKit.toast('ใส่ชื่อสินค้าก่อนนะ'); return; }
  if(!target){  GeminiKit.toast('ระบุกลุ่มเป้าหมายด้วย'); return; }
  if(!plats.length){ GeminiKit.toast('เลือกแพลตฟอร์มอย่างน้อย 1 อัน'); return; }

  const out = document.getElementById('output');
  const btn = document.getElementById('go');
  btn.disabled = true;
  out.innerHTML = '<div class="loading"><div class="spinner"></div>AI กำลังคิดโฆษณา 5 ชุด...</div>';

  const platLine = plats.join(', ');
  const prompt = `สร้างโฆษณาขายของ 5 ชุดสำหรับทำ A/B test โดยใช้ "เฉพาะข้อมูลที่ให้" เท่านั้น ห้ามแต่งสรรพคุณ ตัวเลข รีวิว หรือโปรโมชันที่ผู้ใช้ไม่ได้ระบุ:
- สินค้า/บริการ: ${product}
- กลุ่มเป้าหมาย: ${target}
- จุดขาย/โปรโมชัน: ${promo || 'ไม่ระบุ (อย่าแต่งโปรขึ้นมาเอง)'}
- แพลตฟอร์มที่จะลง: ${platLine} (ปรับสำนวน/ความยาว/อีโมจิให้เข้ากับแพลตฟอร์มเหล่านี้)
- โทนการเขียน: ${tone}

ข้อกำหนดคุณภาพ:
- hook ต้องสะดุดตาใน 1 บรรทัดแรก พูดกับ "${target}" ตรง ๆ ให้รู้สึกว่าโฆษณานี้พูดถึงเขา
- แต่ละชุดใช้มุม hook ต่างกัน: ตั้งคำถามโดนใจ / ปัญหา-วิธีแก้ / เรื่องเล่าสั้น / ชี้ประโยชน์ที่ได้ / สร้างความเร่งด่วน
- body เขียนแบบขายของไทยที่อ่านลื่น เน้นประโยชน์ที่ลูกค้าจะได้ (ไม่ใช่แค่คุณสมบัติ) ใส่อีโมจิพอดี ๆ ขึ้นบรรทัดใหม่ให้อ่านง่าย
- cta ต้องชัดและทำตามได้ทันที สอดคล้องช่องทาง เช่น "ทักแชทเลย", "สั่งซื้อตอนนี้", "กดลิงก์ใต้โพสต์"

ตอบเป็น JSON array เท่านั้น ห้ามมีข้อความอื่นนอก array โครงสร้าง:
[
  {"angle":"ชื่อมุม hook สั้น ๆ เช่น ตั้งคำถาม","hook":"ประโยคดึงดูด 1 บรรทัด","body":"เนื้อหาโฆษณา 2-4 บรรทัด","cta":"ข้อความปุ่ม/คำกระตุ้น"}
]`;

  try {
    const ads = await GeminiKit.text(prompt, {
      json: true,
      system: 'คุณคือนักเขียนคอนเทนต์และนักการตลาดขายของออนไลน์ไทยมือโปร เชี่ยวชาญ Facebook/IG/TikTok Ads เขียนภาษาไทยที่ลูกค้าอ่านแล้วอยากซื้อ พูดกับกลุ่มเป้าหมายตรงจุด ไม่เว่อร์เกินจริง และยึดเฉพาะข้อมูลที่ผู้ใช้ให้'
    });
    if(!Array.isArray(ads) || !ads.length) throw new Error('AI ตอบในรูปแบบที่อ่านไม่ได้ ลองใหม่อีกครั้ง');

    lastAds = ads;
    out.innerHTML = `
      <div class="bulk">
        <button onclick="copyAll()">📋 คัดลอกทั้งหมด</button>
        <button onclick="downloadAll()">⬇️ ดาวน์โหลด .txt</button>
      </div>
    ` + ads.map((ad, i) => `
      <div class="ad-card">
        <div class="badge">ชุดที่ ${i+1}${ad.angle ? ' · ' + esc(ad.angle) : ''}</div>
        <div class="ad-hook">🎯 ${esc(ad.hook)}</div>
        <div class="ad-body">${esc(ad.body)}</div>
        <div class="ad-cta">👉 ${esc(ad.cta)}</div>
        <button class="copy-btn" data-i="${i}" onclick="cpAd(this)">📋 คัดลอกทั้งชุด</button>
      </div>
    `).join('');
  } catch(e) {
    out.innerHTML = '<div class="error-card">⚠️ ' + esc(e.message) + '</div>';
  } finally {
    btn.disabled = false;
  }
}

function adToText(ad){
  return `🎯 Hook:\n${ad.hook}\n\n📝 Body:\n${ad.body}\n\n👉 CTA: ${ad.cta}`;
}
function allAdsText(){
  return lastAds.map((ad, i) =>
    `===== ชุดที่ ${i+1}${ad.angle ? ' · ' + ad.angle : ''} =====\n${adToText(ad)}`
  ).join('\n\n');
}

function cpAd(btn){
  const ad = lastAds[+btn.dataset.i];
  if(!ad) return;
  GeminiKit.copy(adToText(ad));
}
function copyAll(){
  if(!lastAds.length) return;
  GeminiKit.copy(allAdsText());
}
function downloadAll(){
  if(!lastAds.length) return;
  GeminiKit.download('facebook-ads.txt', allAdsText(), 'text/plain');
}

function esc(s){ return (s==null?'':s).toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
</script></body></html>
