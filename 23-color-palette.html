<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ดึงพาเลตต์สีแบรนด์ 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#ec008c;--bg2:#fc6767;--accent:#ec4899;--soft:#fce7f3;--card:#fff;--ink:#1f2937;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt',system-ui,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;color:var(--ink);padding:20px 14px 60px}
.wrap{max-width:460px;margin:0 auto}
header{text-align:center;color:#fff;margin-bottom:18px}
header h1{font-size:26px;font-weight:700}
header p{font-size:13px;opacity:.92;margin-top:4px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.18);margin-bottom:16px}
label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
input[type=text],textarea,select{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:12px 13px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:border-color .2s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.drop{border:2px dashed var(--soft);border-radius:13px;padding:30px 14px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--soft)}
.drop:hover{border-color:var(--accent)}
.drop-icon{font-size:32px;margin-bottom:8px}
.drop-text{font-size:14px;color:var(--muted)}
.preview-wrap{margin-top:12px;display:none}
.preview-wrap img{width:100%;border-radius:12px;max-height:260px;object-fit:cover}
.relink{display:inline-block;margin-top:10px;font-size:13px;color:var(--accent);font-weight:600;cursor:pointer;text-decoration:underline}
.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--bg1),var(--accent));color:#fff;box-shadow:0 10px 24px rgba(0,0,0,.25)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.loading{text-align:center;color:#fff;padding:22px;font-size:15px}
.spinner{width:34px;height:34px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;margin:0 auto 10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.18);margin-bottom:16px}
.result-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.result-card h2{font-size:16px;font-weight:700;color:var(--ink)}
.tools{display:flex;gap:8px;flex-wrap:wrap}
.tool-btn{border:none;background:var(--soft);color:var(--accent);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.tool-btn:hover{filter:brightness(.97)}
.swatch-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.swatch-row{display:flex;align-items:center;gap:12px;border-radius:14px;padding:12px;background:#f9fafb}
.swatch-box{width:54px;height:54px;border-radius:12px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.swatch-info{flex:1;min-width:0}
.swatch-name{font-size:14px;font-weight:600;color:var(--ink)}
.swatch-use{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}
.swatch-hex{font-size:12px;font-weight:600;color:var(--accent);margin-top:4px;font-family:monospace}
.copy-hex{border:none;background:var(--soft);color:var(--accent);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.guidance-box{background:var(--soft);border-radius:14px;padding:14px;font-size:14px;line-height:1.8;color:var(--ink)}
.guidance-box strong{display:block;font-size:13px;color:var(--accent);margin-bottom:6px}
.empty{background:#fff;border-radius:16px;padding:20px 16px;box-shadow:0 8px 20px rgba(0,0,0,.1);text-align:center}
.empty-icon{font-size:34px;margin-bottom:8px}
.empty h3{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px}
.empty ul{text-align:left;font-size:13px;color:var(--muted);line-height:1.9;margin:8px 0 0;padding-left:20px}
.err{background:#fff;border-radius:16px;padding:14px 16px;color:#dc2626;font-size:14px;box-shadow:0 8px 20px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ดึงพาเลตต์สีแบรนด์ 🎨</h1>
    <p>อัปรูป mood/inspiration → AI วิเคราะห์สีสำหรับแบรนด์คุณ</p>
  </header>

  <div class="card">
    <div class="field">
      <label>อัปโหลดรูป mood board หรือรูป inspiration</label>
      <div class="drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">🖼️</div>
        <div class="drop-text">แตะเพื่อเลือกรูป<br><span style="font-size:12px;opacity:.7">รองรับ JPG, PNG, WEBP</span></div>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden onchange="handleFile(this.files[0])">
      <div class="preview-wrap" id="previewWrap">
        <img id="preview" src="" alt="preview">
        <span class="relink" onclick="document.getElementById('fileInput').click()">เปลี่ยนรูป</span>
      </div>
    </div>

    <div class="field">
      <label>ประเภทธุรกิจ / สินค้า (ไม่ใส่ก็ได้ แต่ช่วยให้ผลคมขึ้น)</label>
      <input type="text" id="bizType" placeholder="เช่น ร้านกาแฟ, คลินิกความงาม, ขนมโฮมเมด, เสื้อผ้าผู้หญิง">
    </div>

    <div class="field">
      <label>แพลตฟอร์ม / การใช้งานหลัก</label>
      <select id="platform">
        <option value="">ทั่วไป (ทุกช่องทาง)</option>
        <option value="Facebook/Instagram โพสต์และโฆษณา">Facebook / Instagram</option>
        <option value="TikTok / วิดีโอสั้น">TikTok / วิดีโอสั้น</option>
        <option value="Shopee / Lazada ร้านค้าออนไลน์">Shopee / Lazada</option>
        <option value="เว็บไซต์ / Landing Page">เว็บไซต์ / Landing Page</option>
        <option value="โลโก้และแพ็กเกจจิ้งสินค้า">โลโก้ / แพ็กเกจจิ้ง</option>
        <option value="หน้าร้าน / ป้ายและตกแต่ง">หน้าร้าน / ป้าย</option>
      </select>
    </div>

    <div class="field">
      <label>โทน/อารมณ์ที่อยากได้ (ไม่ใส่ก็ได้)</label>
      <input type="text" id="moodNote" placeholder="เช่น หรูดูแพง, สดใสวัยรุ่น, อบอุ่นเป็นกันเอง, มินิมอล">
    </div>
  </div>

  <button class="btn" id="go" onclick="run()">🎨 วิเคราะห์พาเลตต์สี</button>
  <div id="output" style="margin-top:16px"></div>
</div>

<script src="gemini-kit.js"></script>
<script>
GeminiKit.mountGear();

let selectedFile = null;
let lastResult = null;

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('preview').src = e.target.result;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('dropZone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function run() {
  if (!selectedFile) { GeminiKit.toast('เลือกรูปก่อนนะคะ'); return; }

  const out = document.getElementById('output');
  const btn = document.getElementById('go');
  const bizType = document.getElementById('bizType').value.trim();
  const platform = document.getElementById('platform').value;
  const moodNote = document.getElementById('moodNote').value.trim();

  btn.disabled = true;
  out.innerHTML = '<div class="loading"><div class="spinner"></div>AI กำลังวิเคราะห์สี...</div>';

  let ctx = '';
  if (bizType)  ctx += `\n- ประเภทธุรกิจ/สินค้า: ${bizType}`;
  if (platform) ctx += `\n- ใช้กับแพลตฟอร์ม: ${platform}`;
  if (moodNote) ctx += `\n- โทน/อารมณ์ที่ต้องการ: ${moodNote}`;
  const ctxBlock = ctx ? `\n\nบริบทจากเจ้าของแบรนด์ (ใช้ปรับโทนให้เข้ากับธุรกิจ):${ctx}` : '';

  const system = `คุณเป็นที่ปรึกษาแบรนด์ดิ้งและผู้ช่วยร้านค้าออนไลน์ไทยมืออาชีพ เชี่ยวชาญการเลือกสีให้แบรนด์ขายได้จริง พูดภาษาไทยกระชับ เข้าใจง่าย ใช้ได้ทันที
กฎเหล็ก: วิเคราะห์เฉพาะสีที่เห็นจริงในรูปเท่านั้น ห้ามเดาหรือแต่งสีที่ไม่ปรากฏในรูป ค่า hex ต้องประมาณจากสีที่เห็นจริง ถ้ารูปไม่ใช่รูปที่มีสีชัดเจน (เช่น เบลอ มืดเกิน หรือเป็นเอกสารล้วน) ให้ตั้ง readable=false`;

  const prompt = `วิเคราะห์รูปนี้แล้วดึงพาเลตต์สีที่เหมาะกับแบรนด์ธุรกิจ 5-6 สี โดยอ้างอิงจากสีที่ปรากฏจริงในรูปเท่านั้น${ctxBlock}

ตอบเป็น JSON เท่านั้น รูปแบบ:
{
  "readable": true,
  "palette":[
    {
      "hex":"#xxxxxx",
      "name":"ชื่อสี (ภาษาไทย)",
      "role":"บทบาทสั้นๆ เช่น สีหลัก / สีรอง / สีเน้น / พื้นหลัง / ข้อความ",
      "use":"แนะนำใช้กับอะไรให้ actionable เช่น พื้นปุ่ม CTA, พื้นหลังโพสต์, สีโลโก้, ตัวอักษรหัวข้อ"
    }
  ],
  "pairings":["คู่สีที่เข้ากันใช้คู่กันได้ดี เช่น #aaaaaa กับ #bbbbbb สำหรับปุ่มกับพื้นหลัง", "..."],
  "avoid":"สีหรือการใช้ที่ควรเลี่ยงกับแบรนด์นี้ 1 ประโยค (ถ้ามี)",
  "guidance":"แนวทางนำสีชุดนี้ไปใช้กับแบรนด์ให้ดูโปรและขายได้ 2-3 ประโยค"
}
ถ้าอ่านสีจากรูปไม่ได้ ให้ตอบ {"readable":false,"reason":"เหตุผลสั้นๆ"} เท่านั้น
ห้ามมีข้อความอื่นนอกจาก JSON`;

  try {
    const data = await GeminiKit.vision(prompt, [selectedFile], { json: true, system });

    if (data && data.readable === false) {
      renderEmpty(data.reason);
      return;
    }
    if (!data || !Array.isArray(data.palette) || !data.palette.length) {
      renderEmpty('AI ดึงสีจากรูปนี้ไม่ออก');
      return;
    }

    lastResult = data;
    renderResult(data);
  } catch(e) {
    out.innerHTML = '<div class="err">⚠️ ' + esc(e.message) + '</div>';
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data) {
  const swatches = data.palette.map(c => `
    <div class="swatch-row">
      <div class="swatch-box" style="background:${esc(c.hex)}"></div>
      <div class="swatch-info">
        <div class="swatch-name">${esc(c.name)}${c.role ? ' · <span style="color:var(--accent)">'+esc(c.role)+'</span>' : ''}</div>
        <div class="swatch-use">${esc(c.use)}</div>
        <div class="swatch-hex">${esc(c.hex)}</div>
      </div>
      <button class="copy-hex" data-hex="${esc(c.hex)}" onclick="cpHex(this)">คัดลอก</button>
    </div>
  `).join('');

  let extra = '';
  if (Array.isArray(data.pairings) && data.pairings.length) {
    extra += `<div class="guidance-box" style="margin-bottom:12px"><strong>🔗 คู่สีแนะนำ</strong>${data.pairings.map(p => '• ' + esc(p)).join('<br>')}</div>`;
  }
  if (data.avoid) {
    extra += `<div class="guidance-box" style="margin-bottom:12px"><strong>⚠️ ควรเลี่ยง</strong>${esc(data.avoid)}</div>`;
  }

  document.getElementById('output').innerHTML = `
    <div class="result-card">
      <div class="result-head">
        <h2>🎨 พาเลตต์สีแบรนด์ของคุณ</h2>
        <div class="tools">
          <button class="tool-btn" onclick="copyAll()">📋 คัดลอกทั้งหมด</button>
          <button class="tool-btn" onclick="dlTxt()">⬇️ .txt</button>
          <button class="tool-btn" onclick="dlCsv()">⬇️ .csv</button>
        </div>
      </div>
      <div class="swatch-list">${swatches}</div>
      ${extra}
      <div class="guidance-box">
        <strong>💡 แนวทางใช้สี</strong>
        ${esc(data.guidance)}
      </div>
    </div>
  `;
}

function renderEmpty(reason) {
  document.getElementById('output').innerHTML = `
    <div class="empty">
      <div class="empty-icon">🤔</div>
      <h3>AI อ่านสีจากรูปนี้ไม่ออก</h3>
      <div class="swatch-use" style="color:var(--muted)">${reason ? esc(reason) : 'รูปอาจมืด เบลอ หรือไม่มีสีที่ชัดเจนพอ'}</div>
      <ul>
        <li>ใช้รูปที่สว่าง คมชัด เห็นสีจริง</li>
        <li>เลือกรูป mood board / สินค้า / โลโก้ ที่มีสีเด่น</li>
        <li>หลีกเลี่ยงรูปเอกสารล้วนหรือภาพขาวดำ</li>
        <li>กรอกประเภทธุรกิจช่วยให้ AI เดาโทนได้แม่นขึ้น</li>
      </ul>
    </div>
  `;
}

function cpHex(btn) {
  GeminiKit.copy(btn.dataset.hex);
}

function paletteToText() {
  if (!lastResult) return '';
  let t = 'พาเลตต์สีแบรนด์\n====================\n';
  lastResult.palette.forEach((c, i) => {
    t += `${i+1}. ${c.name || ''}${c.role ? ' ('+c.role+')' : ''}\n   HEX: ${c.hex || ''}\n   ใช้: ${c.use || ''}\n\n`;
  });
  if (Array.isArray(lastResult.pairings) && lastResult.pairings.length) {
    t += 'คู่สีแนะนำ:\n' + lastResult.pairings.map(p => '- ' + p).join('\n') + '\n\n';
  }
  if (lastResult.avoid) t += 'ควรเลี่ยง: ' + lastResult.avoid + '\n\n';
  if (lastResult.guidance) t += 'แนวทางใช้สี:\n' + lastResult.guidance + '\n';
  return t;
}

function copyAll() {
  GeminiKit.copy(paletteToText());
}

function dlTxt() {
  if (!lastResult) return;
  GeminiKit.download('palette-แบรนด์.txt', paletteToText(), 'text/plain');
}

function dlCsv() {
  if (!lastResult) return;
  const q = s => '"' + (s == null ? '' : s).toString().replace(/"/g, '""') + '"';
  let csv = '﻿' + ['ลำดับ','ชื่อสี','บทบาท','HEX','การใช้งาน'].map(q).join(',') + '\n';
  lastResult.palette.forEach((c, i) => {
    csv += [i+1, c.name, c.role, c.hex, c.use].map(q).join(',') + '\n';
  });
  GeminiKit.download('palette-แบรนด์.csv', csv, 'text/csv');
}

function esc(s) {
  return (s == null ? '' : s).toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body></html>
